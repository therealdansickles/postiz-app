events {}
http {
  server {
    listen 8080;
    location /api/ {
      proxy_pass http://127.0.0.1:3000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location / {
      proxy_pass http://127.0.0.1:4200;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
